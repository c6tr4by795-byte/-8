<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>تسجيل الدخول — العراق الأخضر</title>
  <meta name="description" content="سجّل الدخول إلى منصة العراق الأخضر لمتابعة الأشجار التي زرعتها." />
  <meta name="theme-color" content="#0F3D2E" />

  <!-- Brand fonts: Tajawal (Arabic UI) + Manrope (Latin wordmark & numerals) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Shared, app-wide styles (design tokens → reset → components) -->
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/reset.css" />
  <link rel="stylesheet" href="../../css/components.css" />

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <main class="login-screen">
    <div class="login-screen__pattern" aria-hidden="true"></div>

    <div class="login-card ig-card">

      <!-- Brand mark: growth-ring badge behind a layered tree emblem.
           The concentric rings are the app's recurring "growth" motif —
           the same shape language will reappear later as level/progress
           rings on tree and user profile screens. -->
      <div class="brand-mark">
        <svg class="brand-mark__rings" viewBox="0 0 200 200" aria-hidden="true">
          <circle cx="100" cy="100" r="96" />
          <circle cx="100" cy="100" r="80" stroke-dasharray="4 10" />
          <circle cx="100" cy="100" r="64" stroke-dasharray="2 8" />
        </svg>

        <div class="brand-mark__emblem">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle cx="60" cy="60" r="60" fill="url(#emblemGradient)" />
            <defs>
              <linearGradient id="emblemGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#2FA866" />
                <stop offset="1" stop-color="#0F3D2E" />
              </linearGradient>
            </defs>
            <!-- Layered canopy -->
            <g class="brand-mark__canopy">
              <circle cx="60" cy="46" r="26" fill="#3FBE7A" />
              <circle cx="44" cy="56" r="19" fill="#2FA866" />
              <circle cx="78" cy="56" r="19" fill="#2FA866" />
              <circle cx="60" cy="60" r="20" fill="#1E7145" />
            </g>
            <!-- Trunk -->
            <rect x="55" y="72" width="10" height="24" rx="3" fill="#8B5E34" />
          </svg>
        </div>
      </div>

      <h1 class="brand-wordmark">IRAQ GREEN</h1>
      <p class="brand-subtitle">منصة العراق الأخضر</p>

      <form class="login-form" id="loginForm" novalidate>

        <!-- Email field -->
        <div class="ig-field" id="emailField">
          <label class="ig-field__label" for="email">البريد الإلكتروني</label>
          <div class="ig-input-wrap">
            <span class="ig-input__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="m3.5 7 8.5 6 8.5-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              class="ig-input"
              type="email"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              autocomplete="email"
              inputmode="email"
              dir="ltr"
              required
            />
          </div>
          <span class="ig-field__error">يرجى إدخال بريد إلكتروني صحيح</span>
        </div>

        <!-- Password field -->
        <div class="ig-field" id="passwordField">
          <label class="ig-field__label" for="password">كلمة المرور</label>
          <div class="ig-input-wrap">
            <span class="ig-input__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="5" y="10.5" width="14" height="9.5" rx="2" stroke="currentColor" stroke-width="1.6"/>
                <path d="M8 10.5V7.5a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              class="ig-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              dir="ltr"
              required
            />
            <button type="button" class="ig-input__action" id="togglePassword" aria-label="إظهار كلمة المرور">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
          <span class="ig-field__error">كلمة المرور يجب ألا تقل عن 6 أحرف</span>
        </div>

        <button type="submit" class="ig-btn ig-btn--primary" id="loginButton">
          <span class="ig-btn__spinner" aria-hidden="true"></span>
          <span class="ig-btn__label">تسجيل الدخول</span>
        </button>

        <div class="ig-divider">أو</div>

        <button type="button" class="ig-btn ig-btn--secondary" id="googleButton">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.2 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5Z"/>
            <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.2 29.6 4 24 4c-7.6 0-14.2 4.3-17.7 10.7Z"/>
            <path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.4C29.7 34.7 27 35.6 24 35.6c-5.3 0-9.7-3.6-11.3-8.4l-6.6 5.1C9.7 39.6 16.3 44 24 44Z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.4C41.4 36 44 30.6 44 24c0-1.3-.1-2.7-.4-3.5Z"/>
          </svg>
          <span>تسجيل بواسطة Google</span>
        </button>

      </form>

      <div class="login-links">
        <a href="#" class="ig-link" id="forgotPasswordLink">هل نسيت كلمة المرور؟</a>
        <a href="#" class="ig-link" id="createAccountLink">إنشاء حساب جديد</a>
      </div>

    </div>
  </main>

  <!-- Shared utilities, then this page's own logic -->
  <script src="../../js/utils.js"></script>
  <script src="login.js"></script>
</body>
</html>
