<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1E8E3E" />
  <title>Iraq Green | تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="card" id="loginCard">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
            <path d="M12 2C9.5 4.5 7 7.2 7 10.2C7 12.4 8.5 14 10.5 14.3C10 15.6 9 16.8 7.5 17.8C7.2 18 7.3 18.5 7.7 18.5H16.3C16.7 18.5 16.8 18 16.5 17.8C15 16.8 14 15.6 13.5 14.3C15.5 14 17 12.4 17 10.2C17 7.2 14.5 4.5 12 2Z" fill="currentColor"/>
            <rect x="11.2" y="18.5" width="1.6" height="3.5" rx="0.6" fill="currentColor"/>
          </svg>
        </div>
      </div>

      <!-- Title -->
      <h1 class="title">IRAQ GREEN</h1>
      <p class="subtitle">منصة العراق الأخضر</p>

      <!-- Form -->
      <form id="loginForm" class="form" novalidate>
        <div class="field">
          <label for="email" class="field-label">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="example@email.com"
              autocomplete="email"
              required
            />
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 6.5C3 5.67 3.67 5 4.5 5H19.5C20.33 5 21 5.67 21 6.5V17.5C21 18.33 20.33 19 19.5 19H4.5C3.67 19 3 18.33 3 17.5V6.5Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M4 6.5L12 13L20 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password" class="field-label">كلمة المرور</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="إظهار كلمة المرور">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 12C3.5 7.5 7.5 4.5 12 4.5C16.5 4.5 20.5 7.5 22 12C20.5 16.5 16.5 19.5 12 19.5C7.5 19.5 3.5 16.5 2 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="row-between">
          <label class="checkbox">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkbox-box"></span>
            <span class="checkbox-label">تذكرني</span>
          </label>
          <a href="#" class="link-forgot">نسيت كلمة المرور؟</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="btn-label">تسجيل الدخول</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

        <div class="divider">
          <span>أو</span>
        </div>

        <button type="button" class="btn btn-google" id="googleBtn">
          <span class="google-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="20" height="20">
              <path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3c-1.6 4.6-6 7.9-11.3 7.9-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.1-5.1C33.7 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l5.9 4.3C13.7 15.5 18.5 12.4 24 12.4c3.1 0 5.8 1.1 8 3l5.1-5.1C33.7 6.1 29.1 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5 0 9.6-1.9 13.1-5.1l-6-5.1C29 35.7 26.6 36.5 24 36.5c-5.2 0-9.7-3.3-11.3-7.9l-5.9 4.6C9.5 39.7 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6 5.1C40.5 35.7 44 30.4 44 24c0-1.2-.1-2.4-.4-3.5z"/>
            </svg>
          </span>
          <span class="btn-label">تسجيل الدخول عبر Google</span>
        </button>
      </form>

      <p class="signup-hint">
        ليس لديك حساب؟ <a href="#" class="link-signup">إنشاء حساب جديد</a>
      </p>
    </div>

    <p class="footer-note">© 2026 Iraq Green. جميع الحقوق محفوظة</p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
